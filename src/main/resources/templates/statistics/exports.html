<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/navbar :: header-css">
</head>
<body>
<div th:replace="fragments/navbar :: navbar(activeMenu='statistics')">
</div>

<div class="container mt-4">
    <!-- Заголовок -->
    <div class="row mb-4">
        <div class="col">
            <h1 class="display-5">
                <i class="fas fa-download"></i> Статистика выгрузок
            </h1>
        </div>
    </div>

    <!-- Фильтры -->
    <div class="card mb-4">
        <div class="card-body">
            <form method="get" class="row g-3">
                <div class="col-md-4">
                    <label for="startDate" class="form-label">Начальная дата</label>
                    <input type="date" class="form-control" id="startDate" name="startDate"
                           th:value="${startDate}">
                </div>
                <div class="col-md-4">
                    <label for="endDate" class="form-label">Конечная дата</label>
                    <input type="date" class="form-control" id="endDate" name="endDate"
                           th:value="${endDate}">
                </div>
                <div class="col-md-4">
                    <label for="client" class="form-label">Клиент</label>
                    <select class="form-select" id="client" name="clientId">
                        <option value="">Все клиенты</option>
                        <option th:each="client : ${clients}"
                                th:value="${client.id}"
                                th:text="${client.name}"
                                th:selected="${client.id == selectedClientId}">
                        </option>
                    </select>
                </div>
                <div class="col-12 mt-3">
                    <button type="submit" class="btn btn-primary me-2">
                        <i class="fas fa-filter"></i> Применить фильтр
                    </button>
                    <button type="button" class="btn btn-outline-secondary" onclick="resetFilters()">
                        <i class="fas fa-undo"></i> Сбросить
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Статистика -->
    <div class="row mb-4">
        <div class="col-md-3">
            <div class="card text-white bg-primary">
                <div class="card-body">
                    <h5 class="card-title">Всего выгрузок</h5>
                    <p class="card-text display-6" th:text="${totalExports ?: 0}">0</p>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card text-white bg-success">
                <div class="card-body">
                    <h5 class="card-title">Успешных</h5>
                    <p class="card-text display-6" th:text="${successfulExports ?: 0}">0</p>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card text-white bg-info">
                <div class="card-body">
                    <h5 class="card-title">Выгружено записей</h5>
                    <p class="card-text display-6" th:text="${totalRecords ?: 0}">0</p>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card text-white bg-warning">
                <div class="card-body">
                    <h5 class="card-title">Среднее время</h5>
                    <p class="card-text display-6" th:text="${avgProcessingTime ?: '0с'}">0с</p>
                </div>
            </div>
        </div>
    </div>

    <!-- График -->
    <div class="card mb-4">
        <div class="card-header d-flex justify-content-between align-items-center">
            <h5 class="card-title mb-0">Динамика выгрузок</h5>
            <div class="btn-group">
                <button type="button" class="btn btn-outline-secondary btn-sm" onclick="updateChart('daily')">День</button>
                <button type="button" class="btn btn-outline-secondary btn-sm" onclick="updateChart('weekly')">Неделя</button>
                <button type="button" class="btn btn-outline-secondary btn-sm" onclick="updateChart('monthly')">Месяц</button>
            </div>
        </div>
        <div class="card-body">
            <canvas id="exportsChart" height="100"></canvas>
        </div>
    </div>

    <!-- Таблица выгрузок -->
    <div class="card">
        <div class="card-header d-flex justify-content-between align-items-center">
            <h5 class="card-title mb-0">Список выгрузок</h5>
            <div>
                <button class="btn btn-outline-success btn-sm me-2" onclick="downloadSelected()">
                    <i class="fas fa-cloud-download-alt"></i> Скачать выбранные
                </button>
                <button class="btn btn-outline-primary btn-sm" onclick="exportToExcel()">
                    <i class="fas fa-table"></i> Экспорт статистики
                </button>
            </div>
        </div>
        <div class="card-body">
            <div class="table-responsive">
                <table class="table">
                    <thead>
                    <tr>
                        <th>
                            <input type="checkbox" class="form-check-input" id="selectAll"
                                   onclick="toggleSelectAll()">
                        </th>
                        <th>ID</th>
                        <th>Дата</th>
                        <th>Клиент</th>
                        <th>Тип выгрузки</th>
                        <th>Кол-во записей</th>
                        <th>Размер файла</th>
                        <th>Статус</th>
                        <th>Время обработки</th>
                        <th>Действия</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="export : ${exports}">
                        <td>
                            <input type="checkbox" class="form-check-input export-checkbox"
                                   th:value="${export.id}">
                        </td>
                        <td th:text="${export.id}">1</td>
                        <td th:text="${#temporals.format(export.date, 'dd.MM.yyyy HH:mm')}">01.02.2025 12:00</td>
                        <td th:text="${export.clientName}">Клиент</td>
                        <td th:text="${export.type}">CSV</td>
                        <td th:text="${export.recordCount}">1000</td>
                        <td th:text="${export.fileSize}">1.5 MB</td>
                        <td>
                            <span th:class="${'badge ' + export.statusBadgeClass}"
                                  th:text="${export.status}">Статус</span>
                        </td>
                        <td th:text="${export.processingTime}">5 мин</td>
                        <td>
                            <div class="btn-group">
                                <button class="btn btn-sm btn-outline-primary" title="Скачать"
                                        th:onclick="'downloadFile(' + ${export.id} + ')'"
                                        th:disabled="${!export.isReady}">
                                    <i class="fas fa-download"></i>
                                </button>
                                <button class="btn btn-sm btn-outline-info" title="Подробности"
                                        th:onclick="'showDetails(' + ${export.id} + ')'">
                                    <i class="fas fa-info-circle"></i>
                                </button>
                            </div>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <!-- Пагинация -->
            <nav th:if="${exports != null and !exports.isEmpty()}" class="mt-3">
                <ul class="pagination justify-content-center">
                    <li class="page-item" th:classappend="${currentPage == 0 ? 'disabled' : ''}">
                        <a class="page-link" th:href="@{${'/statistics/exports'}(page=${currentPage - 1})}">
                            <i class="fas fa-chevron-left"></i>
                        </a>
                    </li>
                    <li class="page-item" th:each="pageNum : ${#numbers.sequence(0, totalPages - 1)}"
                        th:classappend="${pageNum == currentPage ? 'active' : ''}">
                        <a class="page-link" th:href="@{${'/statistics/exports'}(page=${pageNum})}"
                           th:text="${pageNum + 1}">1</a>
                    </li>
                    <li class="page-item" th:classappend="${currentPage + 1 == totalPages ? 'disabled' : ''}">
                        <a class="page-link" th:href="@{${'/statistics/exports'}(page=${currentPage + 1})}">
                            <i class="fas fa-chevron-right"></i>
                        </a>
                    </li>
                </ul>
            </nav>
        </div>
    </div>
</div>

<!-- Модальное окно с деталями -->
<div class="modal fade" id="exportDetails" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Детали выгрузки</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <!-- Содержимое будет загружено динамически -->
            </div>
        </div>
    </div>
</div>

<div th:replace="fragments/navbar :: footer">
</div>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script th:inline="javascript">
    // Инициализация графика
    const ctx = document.getElementById('exportsChart').getContext('2d');
    let exportsChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: /*[[${chartLabels}]]*/ [],
            datasets: [{
                label: 'Количество выгрузок',
                data: /*[[${chartData}]]*/ [],
                borderColor: 'rgb(75, 192, 192)',
                tension: 0.1
            }]
        },
        options: {
            responsive: true,
            plugins: {
                legend: {
                    position: 'top',
                }
            }
        }
    });

    // Функция обновления графика
    function updateChart(period) {
        const startDate = document.getElementById('startDate').value;
        const endDate = document.getElementById('endDate').value;
        const clientId = document.getElementById('client').value;

        fetch(`/statistics/exports/chart?period=${period}&startDate=${startDate}&endDate=${endDate}&clientId=${clientId}`)
            .then(response => response.json())
            .then(data => {
                exportsChart.data.labels = data.labels;
                exportsChart.data.datasets[0].data = data.values;
                exportsChart.update();
            })
            .catch(error => console.error('Error updating chart:', error));
    }

    // Функция сброса фильтров
    function resetFilters() {
        document.getElementById('startDate').value = '';
        document.getElementById('endDate').value = '';
        document.getElementById('client').value = '';
        document.querySelector('form').submit();
    }

    // Функция выбора всех записей
    function toggleSelectAll() {
        const selectAllCheckbox = document.getElementById('selectAll');
        const checkboxes = document.getElementsByClassName('export-checkbox');
        Array.from(checkboxes).forEach(checkbox => {
            checkbox.checked = selectAllCheckbox.checked;
        });
    }

    // Функция массового скачивания
    function downloadSelected() {
        const selectedIds = Array.from(document.getElementsByClassName('export-checkbox'))
            .filter(checkbox => checkbox.checked)
            .map(checkbox => checkbox.value);

        if (selectedIds.length === 0) {
            alert('Выберите файлы для скачивания');
            return;
        }

        window.location.href = `/statistics/exports/download?ids=${selectedIds.join(',')}`;
    }

    // Функция скачивания одного файла
    function downloadFile(exportId) {
        window.location.href = `/statistics/exports/${exportId}/download`;
    }

    // Функция экспорта статистики в Excel
    function exportToExcel() {
        const startDate = document.getElementById('startDate').value;
        const endDate = document.getElementById('endDate').value;
        const clientId = document.getElementById('client').value;
        window.location.href = `/statistics/exports/export?startDate=${startDate}&endDate=${endDate}&clientId=${clientId}`;
    }

    // Функция показа деталей выгрузки
    function showDetails(exportId) {
        const modal = new bootstrap.Modal(document.getElementById('exportDetails'));

        fetch(`/statistics/exports/${exportId}/details`)
            .then(response => response.text())
            .then(html => {
                document.querySelector('#exportDetails .modal-body').innerHTML = html;
                modal.show();
            })
            .catch(error => {
                console.error('Error loading export details:', error);
                alert('Ошибка загрузки деталей');
            });
    }

    // Обновление графика при загрузке страницы
    document.addEventListener('DOMContentLoaded', () => {
        updateChart('daily');
    });
</script>

</body>
</html>
