<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/navbar :: header-css">
</head>
<body>
<div th:replace="fragments/navbar :: navbar(activeMenu='statistics')">
</div>

<div class="container mt-4">
    <!-- Заголовок -->
    <div class="row mb-4">
        <div class="col">
            <h1 class="display-5">
                <i class="fas fa-upload"></i> Статистика загрузок
            </h1>
        </div>
    </div>

    <!-- Фильтры -->
    <div class="card mb-4">
        <div class="card-body">
            <form method="get" class="row g-3">
                <div class="col-md-4">
                    <label for="startDate" class="form-label">Начальная дата</label>
                    <input type="date" class="form-control" id="startDate" name="startDate"
                           th:value="${startDate}">
                </div>
                <div class="col-md-4">
                    <label for="endDate" class="form-label">Конечная дата</label>
                    <input type="date" class="form-control" id="endDate" name="endDate"
                           th:value="${endDate}">
                </div>
                <div class="col-md-4 d-flex align-items-end">
                    <button type="submit" class="btn btn-primary me-2">
                        <i class="fas fa-filter"></i> Применить фильтр
                    </button>
                    <button type="button" class="btn btn-outline-secondary" onclick="resetFilters()">
                        <i class="fas fa-undo"></i> Сбросить
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Статистика -->
    <div class="row mb-4">
        <div class="col-md-3">
            <div class="card text-white bg-primary">
                <div class="card-body">
                    <h5 class="card-title">Всего файлов</h5>
                    <p class="card-text display-6" th:text="${totalUploads ?: 0}">0</p>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card text-white bg-success">
                <div class="card-body">
                    <h5 class="card-title">Успешно обработано</h5>
                    <p class="card-text display-6" th:text="${successfulUploads ?: 0}">0</p>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card text-white bg-info">
                <div class="card-body">
                    <h5 class="card-title">Общий размер</h5>
                    <p class="card-text display-6" th:text="${totalSize ?: '0 MB'}">0 MB</p>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card text-white bg-warning">
                <div class="card-body">
                    <h5 class="card-title">Среднее время</h5>
                    <p class="card-text display-6" th:text="${avgProcessingTime ?: '0с'}">0с</p>
                </div>
            </div>
        </div>
    </div>

    <!-- График -->
    <div class="card mb-4">
        <div class="card-header d-flex justify-content-between align-items-center">
            <h5 class="card-title mb-0">Динамика загрузок</h5>
            <div class="btn-group">
                <button type="button" class="btn btn-outline-secondary btn-sm" onclick="updateChart('daily')">День</button>
                <button type="button" class="btn btn-outline-secondary btn-sm" onclick="updateChart('weekly')">Неделя</button>
                <button type="button" class="btn btn-outline-secondary btn-sm" onclick="updateChart('monthly')">Месяц</button>
            </div>
        </div>
        <div class="card-body">
            <canvas id="uploadsChart" height="100"></canvas>
        </div>
    </div>

    <!-- Таблица загрузок -->
    <div class="card">
        <div class="card-header d-flex justify-content-between align-items-center">
            <h5 class="card-title mb-0">Список загрузок</h5>
            <button class="btn btn-outline-primary btn-sm" onclick="exportToExcel()">
                <i class="fas fa-download"></i> Экспорт
            </button>
        </div>
        <div class="card-body">
            <div class="table-responsive">
                <table class="table">
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>Дата</th>
                        <th>Клиент</th>
                        <th>Файл</th>
                        <th>Размер</th>
                        <th>Статус</th>
                        <th>Время обработки</th>
                        <th>Действия</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="upload : ${uploads}">
                        <td th:text="${upload.id}">1</td>
                        <td th:text="${#temporals.format(upload.date, 'dd.MM.yyyy HH:mm')}">01.02.2025 12:00</td>
                        <td th:text="${upload.clientName}">Клиент</td>
                        <td th:text="${upload.fileName}">file.csv</td>
                        <td th:text="${upload.fileSize}">1.5 MB</td>
                        <td>
                            <span th:class="${'badge ' + upload.statusBadgeClass}"
                                  th:text="${upload.status}">Статус</span>
                        </td>
                        <td th:text="${upload.processingTime}">5 мин</td>
                        <td>
                            <button class="btn btn-sm btn-outline-info" title="Подробности"
                                    th:onclick="'showDetails(' + ${upload.id} + ')'">
                                <i class="fas fa-info-circle"></i>
                            </button>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <!-- Пагинация -->
            <nav th:if="${uploads != null and !uploads.isEmpty()}" class="mt-3">
                <ul class="pagination justify-content-center">
                    <li class="page-item" th:classappend="${currentPage == 0 ? 'disabled' : ''}">
                        <a class="page-link" th:href="@{${'/statistics/uploads'}(page=${currentPage - 1})}">
                            <i class="fas fa-chevron-left"></i>
                        </a>
                    </li>
                    <li class="page-item" th:each="pageNum : ${#numbers.sequence(0, totalPages - 1)}"
                        th:classappend="${pageNum == currentPage ? 'active' : ''}">
                        <a class="page-link" th:href="@{${'/statistics/uploads'}(page=${pageNum})}"
                           th:text="${pageNum + 1}">1</a>
                    </li>
                    <li class="page-item" th:classappend="${currentPage + 1 == totalPages ? 'disabled' : ''}">
                        <a class="page-link" th:href="@{${'/statistics/uploads'}(page=${currentPage + 1})}">
                            <i class="fas fa-chevron-right"></i>
                        </a>
                    </li>
                </ul>
            </nav>
        </div>
    </div>
</div>

<!-- Модальное окно с деталями -->
<div class="modal fade" id="uploadDetails" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Детали загрузки</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <!-- Содержимое будет загружено динамически -->
            </div>
        </div>
    </div>
</div>

<div th:replace="fragments/navbar :: footer">
</div>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script th:inline="javascript">
    // Инициализация графика
    const ctx = document.getElementById('uploadsChart').getContext('2d');
    let uploadsChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: /*[[${chartLabels}]]*/ [],
            datasets: [{
                label: 'Количество загрузок',
                data: /*[[${chartData}]]*/ [],
                borderColor: 'rgb(75, 192, 192)',
                tension: 0.1
            }]
        },
        options: {
            responsive: true,
            plugins: {
                legend: {
                    position: 'top',
                }
            }
        }
    });

    // Функция обновления графика
    function updateChart(period) {
        const startDate = document.getElementById('startDate').value;
        const endDate = document.getElementById('endDate').value;

        fetch(`/statistics/uploads/chart?period=${period}&startDate=${startDate}&endDate=${endDate}`)
            .then(response => response.json())
            .then(data => {
                uploadsChart.data.labels = data.labels;
                uploadsChart.data.datasets[0].data = data.values;
                uploadsChart.update();
            })
            .catch(error => console.error('Error updating chart:', error));
    }

    // Функция сброса фильтров
    function resetFilters() {
        document.getElementById('startDate').value = '';
        document.getElementById('endDate').value = '';
        document.querySelector('form').submit();
    }

    // Функция экспорта в Excel
    function exportToExcel() {
        const startDate = document.getElementById('startDate').value;
        const endDate = document.getElementById('endDate').value;
        window.location.href = `/statistics/uploads/export?startDate=${startDate}&endDate=${endDate}`;
    }

    // Функция показа деталей загрузки
    function showDetails(uploadId) {
        const modal = new bootstrap.Modal(document.getElementById('uploadDetails'));

        fetch(`/statistics/uploads/${uploadId}/details`)
            .then(response => response.text())
            .then(html => {
                document.querySelector('#uploadDetails .modal-body').innerHTML = html;
                modal.show();
            })
            .catch(error => {
                console.error('Error loading upload details:', error);
                alert('Ошибка загрузки деталей');
            });
    }
</script>

</body>
</html>
