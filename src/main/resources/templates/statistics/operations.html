<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/navbar :: header-css">
</head>
<body>
<header th:replace="fragments/navbar :: navbar(activeMenu='statistics')">
</header>

<div class="container mt-4">
    <!-- Заголовок -->
    <div class="row mb-4">
        <div class="col">
            <h1 class="display-5">
                <i class="fas fa-chart-line"></i> Статистика операций
            </h1>
        </div>
    </div>

    <!-- Фильтры -->
    <div class="card mb-4">
        <div class="card-body">
            <form method="get" class="row g-3">
                <div class="col-md-4">
                    <label for="startDate" class="form-label">Начальная дата</label>
                    <input type="date" class="form-control" id="startDate" name="startDate"
                           th:value="${startDate}">
                </div>
                <div class="col-md-4">
                    <label for="endDate" class="form-label">Конечная дата</label>
                    <input type="date" class="form-control" id="endDate" name="endDate"
                           th:value="${endDate}">
                </div>
                <div class="col-md-4 d-flex align-items-end">
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-filter"></i> Применить фильтр
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Статистика -->
    <div class="row mb-4">
        <div class="col-md-3">
            <div class="card text-white bg-primary">
                <div class="card-body">
                    <h5 class="card-title">Всего операций</h5>
                    <p class="card-text display-6" th:text="${totalOperations ?: 0}">0</p>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card text-white bg-success">
                <div class="card-body">
                    <h5 class="card-title">Успешных</h5>
                    <p class="card-text display-6" th:text="${successfulOperations ?: 0}">0</p>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card text-white bg-warning">
                <div class="card-body">
                    <h5 class="card-title">В процессе</h5>
                    <p class="card-text display-6" th:text="${inProgressOperations ?: 0}">0</p>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card text-white bg-danger">
                <div class="card-body">
                    <h5 class="card-title">С ошибками</h5>
                    <p class="card-text display-6" th:text="${failedOperations ?: 0}">0</p>
                </div>
            </div>
        </div>
    </div>

    <!-- График -->
    <div class="card mb-4">
        <div class="card-header">
            <h5 class="card-title">Динамика операций</h5>
        </div>
        <div class="card-body">
            <canvas id="operationsChart" height="100"></canvas>
        </div>
    </div>

    <!-- Таблица операций -->
    <div class="card">
        <div class="card-header d-flex justify-content-between align-items-center">
            <h5 class="card-title mb-0">Список операций</h5>
            <button class="btn btn-outline-primary btn-sm" onclick="exportToExcel()">
                <i class="fas fa-download"></i> Экспорт
            </button>
        </div>
        <div class="card-body">
            <div class="table-responsive">
                <table class="table">
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>Дата</th>
                        <th>Тип</th>
                        <th>Клиент</th>
                        <th>Статус</th>
                        <th>Длительность</th>
                        <th>Действия</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="operation : ${operations}">
                        <td th:text="${operation.id}">1</td>
                        <td th:text="${#temporals.format(operation.date, 'dd.MM.yyyy HH:mm')}">01.02.2025 12:00</td>
                        <td th:text="${operation.type}">Загрузка</td>
                        <td th:text="${operation.clientName}">Клиент</td>
                        <td>
                            <span th:class="${'badge ' + operation.statusBadgeClass}"
                                  th:text="${operation.status}">Статус</span>
                        </td>
                        <td th:text="${operation.duration}">5 мин</td>
                        <td>
                            <button class="btn btn-sm btn-outline-info" title="Подробности"
                                    th:onclick="'showDetails(' + ${operation.id} + ')'">
                                <i class="fas fa-info-circle"></i>
                            </button>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- Модальное окно с деталями -->
<div class="modal fade" id="operationDetails" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Детали операции</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <!-- Содержимое будет загружено динамически -->
            </div>
        </div>
    </div>
</div>

<div th:replace="fragments/navbar :: footer">
</div>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script th:inline="javascript">
    // Инициализация графика
    const ctx = document.getElementById('operationsChart').getContext('2d');
    const chart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: /*[[${chartLabels}]]*/ [],
            datasets: [{
                label: 'Количество операций',
                data: /*[[${chartData}]]*/ [],
                borderColor: 'rgb(75, 192, 192)',
                tension: 0.1
            }]
        },
        options: {
            responsive: true,
            plugins: {
                legend: {
                    position: 'top',
                }
            }
        }
    });

    // Функция экспорта в Excel
    function exportToExcel() {
        const startDate = document.getElementById('startDate').value;
        const endDate = document.getElementById('endDate').value;
        window.location.href = `/statistics/operations/export?startDate=${startDate}&endDate=${endDate}`;
    }

    // Функция показа деталей операции
    function showDetails(operationId) {
        const modal = new bootstrap.Modal(document.getElementById('operationDetails'));

        // Загрузка деталей операции
        fetch(`/statistics/operations/${operationId}/details`)
            .then(response => response.text())
            .then(html => {
                document.querySelector('#operationDetails .modal-body').innerHTML = html;
                modal.show();
            })
            .catch(error => {
                console.error('Error loading operation details:', error);
                alert('Ошибка загрузки деталей операции');
            });
    }
</script>

</body>
</html>
