<!-- src/main/resources/templates/client/export-mappings/edit.html -->

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="${mapping.id == null ? 'Новая настройка экспорта' : 'Редактирование настройки экспорта'}">Настройка
        экспорта</title>
    <div th:replace="~{fragments/navbar :: header-css}"></div>
    <style>
        .drag-handle {
            cursor: move;
            color: #6c757d;
            padding: 0.5rem;
        }

        .drag-handle:hover {
            color: #000;
        }

        .ui-sortable-helper {
            display: table;
            background: white;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .ui-sortable-placeholder {
            visibility: visible !important;
            background: #f8f9fa;
            border: 2px dashed #dee2e6;
            height: 50px;
        }

        .field-display-name {
            border: 1px solid #ced4da;
            border-radius: 4px;
            padding: 0.375rem 0.75rem;
        }

        .fields-container {
            border: 1px solid #dee2e6;
            border-radius: 0.375rem;
            padding: 1rem;
            background-color: #fff;
        }

        .fields-table {
            margin-bottom: 0;
        }

        .fields-table th {
            background-color: #f8f9fa;
            border-bottom: 2px solid #dee2e6;
        }

        .strategy-parameters {
            border: 1px solid #dee2e6;
            border-radius: 0.375rem;
            padding: 1rem;
            margin-top: 1rem;
        }

        .breadcrumb-item + .breadcrumb-item::before {
            content: "›";
        }

        /* Стили для колонок таблицы */
        .fields-table th.col-name,
        .fields-table td.col-name {
            width: 40%; /* Увеличиваем ширину колонки с названием */
        }

        .fields-table th.col-key,
        .fields-table td.col-key {
            width: 35%; /* Подстраиваем ширину колонки с ключом */
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 0; /* Важно для работы text-overflow */
        }

        .fields-table th.col-position,
        .fields-table td.col-position {
            width: 80px;
            text-align: center;
        }

        .fields-table th.col-actions,
        .fields-table td.col-actions {
            width: 60px;
            text-align: center;
        }

        .fields-table th.col-handle,
        .fields-table td.col-handle {
            width: 40px;
            text-align: center;
        }

        /* Стиль для поля ввода названия */
        .field-display-name {
            width: 100%;
        }
    </style>
</head>
<body>
<div th:replace="fragments/navbar :: navbar(activeMenu='home')"></div>

<div class="container mt-4">
    <!-- Навигация -->
    <div class="row mb-4">
        <div class="col">
            <nav aria-label="breadcrumb" class="d-flex align-items-center">
                <a th:href="@{/}" class="btn btn-sm btn-outline-secondary me-2" title="На главную">
                    <i class="fas fa-home"></i>
                </a>
                <a th:href="@{/clients}" class="btn btn-sm btn-outline-secondary me-2" title="К списку магазинов">
                    <i class="fas fa-store"></i>
                </a>
                <a th:href="@{/client/{id}/export-mappings(id=${client.id})}"
                   class="btn btn-sm btn-outline-secondary me-2" title="К списку настроек экспорта">
                    <i class="fas fa-arrow-left"></i>
                </a>
                <ol class="breadcrumb mb-0">
                    <li class="breadcrumb-item"><a th:href="@{/clients}">Магазины</a></li>
                    <li class="breadcrumb-item">
                        <a th:href="@{/client/{id}/dashboard(id=${client.id})}" th:text="${client.name}">Магазин</a>
                    </li>
                    <li class="breadcrumb-item">
                        <a th:href="@{/client/{id}/export-mappings(id=${client.id})}">Настройки экспорта</a>
                    </li>
                    <li class="breadcrumb-item active"
                        th:text="${mapping.id == null ? 'Новая настройка' : 'Редактирование настройки'}">
                    </li>
                </ol>
            </nav>
        </div>
    </div>

    <div class="card">
        <div class="card-header">
            <h2 class="card-title h5 mb-0">
                <i class="fas fa-download me-2"></i>
                <span th:text="${mapping.id == null ? 'Новая настройка экспорта' : 'Редактирование настройки экспорта'}"></span>
            </h2>
        </div>
        <div class="card-body">
            <!-- Сообщения об успехе/ошибке -->
            <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
                <i class="fas fa-check-circle me-2"></i>
                <span th:text="${success}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
                <i class="fas fa-exclamation-circle me-2"></i>
                <span th:text="${error}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <!-- Форма настройки -->
            <form th:action="${mapping.id == null ?
                            '/client/' + client.id + '/export-mappings/create' :
                            '/client/' + client.id + '/export-mappings/' + mapping.id + '/update'}"
                  method="post" id="exportForm" class="needs-validation" novalidate>

                <div class="row mb-4">
                    <!-- Основные настройки -->
                    <div class="col-md-6">
                        <h5 class="mb-3">
                            <i class="fas fa-cog me-2"></i>Основные настройки
                        </h5>
                        <div class="fields-container">
                            <div class="mb-3">
                                <label for="configName" class="form-label">Название конфигурации</label>
                                <input type="text" class="form-control" id="configName" name="configName"
                                       th:value="${mapping.name}" required
                                       placeholder="Введите название конфигурации">
                                <div class="invalid-feedback">
                                    Необходимо указать название конфигурации
                                </div>
                            </div>

                            <div class="mb-3">
                                <label for="configDescription" class="form-label">Описание</label>
                                <textarea class="form-control" id="configDescription" name="configDescription"
                                          th:text="${mapping.description}" rows="3"
                                          placeholder="Добавьте описание конфигурации"></textarea>
                            </div>

                            <div class="mb-3">
                                <label for="strategyType" class="form-label">Стратегия обработки данных</label>
                                <select class="form-select" id="strategyType" name="strategyType" required>
                                    <option value="">Выберите стратегию</option>
                                    <option th:each="strategy : ${strategies}"
                                            th:value="${strategy}"
                                            th:text="${strategy.displayName}"
                                            th:title="${strategy.description}"
                                            th:selected="${mapping.strategyType == strategy}">
                                    </option>
                                </select>
                                <div class="invalid-feedback">
                                    Необходимо выбрать стратегию обработки
                                </div>
                            </div>

                            <!-- Параметры стратегии -->
                            <div id="strategyParameters" class="strategy-parameters" style="display: none;">
                                <h6 class="mb-3">Параметры стратегии</h6>
                                <div id="parameterFields">
                                    <!-- Поля параметров добавляются динамически -->
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Настройка полей -->
                    <div class="col-md-6">
                        <h5 class="mb-3">
                            <i class="fas fa-list me-2"></i>Настройка полей
                        </h5>
                        <div class="fields-container">
                            <table class="table fields-table" id="enabledFieldsTable">
                                <thead>
                                <tr>
                                    <th class="col-handle"></th>
                                    <th class="col-name">Название поля</th>
                                    <th class="col-key">Ключ поля</th>
                                    <th class="col-position">Позиция</th>
                                    <th class="col-actions"></th>
                                </tr>
                                </thead>
                                <tbody>
                                <th:block th:each="group : ${groupedEnabledFields}">
                                    <tr th:each="field : ${group.value}">
                                        <td class="col-handle drag-handle">
                                            <i class="fas fa-grip-vertical"></i>
                                        </td>
                                        <td class="col-name">
                                            <input type="text" class="form-control field-display-name"
                                                   th:value="${field.displayName}"
                                                   th:attr="name='fields[' + ${field.sourceField} + '].displayName'">
                                        </td>
                                        <td class="col-key" th:title="${field.sourceField}"
                                            th:text="${field.sourceField}"></td>
                                        <td class="col-position" th:text="${field.position}"></td>
                                        <td class="col-actions">
                                            <button type="button" class="btn btn-outline-danger btn-sm remove-mapping">
                                                <i class="fas fa-times"></i>
                                            </button>
                                        </td>
                                    </tr>
                                </th:block>
                                </tbody>
                            </table>
                        </div>

                        <h5 class="mb-3 mt-4">
                            <i class="fas fa-database me-2"></i>Доступные поля
                        </h5>
                        <div class="fields-container">
                            <table class="table fields-table" id="disabledFieldsTable">
                                <thead>
                                <tr>
                                    <th class="col-name">Название поля</th>
                                    <th class="col-key">Ключ поля</th>
                                    <th class="col-actions"></th>
                                </tr>
                                </thead>
                                <tbody>
                                <th:block th:each="group : ${groupedDisabledFields}">
                                    <tr th:each="field : ${group.value}">
                                        <td class="col-name" th:text="${field.displayName}"></td>
                                        <td class="col-key" th:title="${field.sourceField}"
                                            th:text="${field.sourceField}"></td>
                                        <td class="col-actions">
                                            <button type="button" class="btn btn-sm btn-success add-field"
                                                    th:attr="data-source-field=${field.sourceField},
                                 data-display-name=${field.displayName}">
                                                <i class="fas fa-plus"></i>
                                            </button>
                                        </td>
                                    </tr>
                                </th:block>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <!-- Кнопки действий -->
                <div class="d-flex gap-2 justify-content-end">
                    <a th:href="@{/client/{id}/export-mappings(id=${client.id})}"
                       class="btn btn-outline-secondary">
                        <i class="fas fa-times me-2"></i>Отмена
                    </a>
                    <th:block th:if="${mapping.id != null}">
                        <button type="button" class="btn btn-warning"
                                onclick="if(confirm('Сбросить настройки к значениям по умолчанию?')) {
                                    window.location.href=this.getAttribute('data-reset-url');
                                }"
                                th:data-reset-url="@{/client/{id}/export-mappings/{mappingId}/reset(id=${client.id},mappingId=${mapping.id})}">
                            <i class="fas fa-undo me-2"></i>Сбросить
                        </button>
                    </th:block>
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-save me-2"></i>Сохранить
                    </button>
                </div>

                <input type="hidden" name="positionsJson" id="positionsJson">
            </form>
        </div>
    </div>
</div>


<div th:replace="~{fragments/navbar :: footer}"></div>

<script th:inline="javascript">
    $(document).ready(function() {
        const clientId = /*[[${client.id}]]*/ null;
        const strategyParameters = /*[[${strategyParameters}]]*/ {};

        // Инициализация сортировки
        $('#enabledFieldsTable tbody').sortable({
            items: 'tr',
            handle: '.drag-handle',
            axis: 'y',
            helper: fixHelperModified,
            placeholder: 'ui-sortable-placeholder',
            forcePlaceholderSize: true,
            stop: function(event, ui) {
                recalculatePositions();
            }
        });

        function fixHelperModified(e, tr) {
            var $originals = tr.children();
            var $helper = tr.clone();
            $helper.children().each(function(index) {
                $(this).width($originals.eq(index).width());
            });
            return $helper;
        }

        // Инициализация валидации формы
        const form = document.getElementById('exportForm');
        form.addEventListener('submit', function(event) {
            if (!this.checkValidity()) {
                event.preventDefault();
                event.stopPropagation();
            }

            // Проверка наличия хотя бы одного активного поля
            const enabledFields = $('#enabledFieldsTable tbody tr').length;
            if (enabledFields === 0) {
                event.preventDefault();
                alert('Добавьте хотя бы одно поле для экспорта');
                return;
            }

            this.classList.add('was-validated');

            // Обновляем конфигурацию перед отправкой
            recalculatePositions();
        });

        // Обработчик стратегий
        document.getElementById('strategyType').addEventListener('change', function() {
            const selectedStrategy = this.value;
            const parametersDiv = document.getElementById('strategyParameters');
            const parameterFields = document.getElementById('parameterFields');

            if (selectedStrategy && strategyParameters[selectedStrategy]) {
                parametersDiv.style.display = 'block';
                parameterFields.innerHTML = '';

                const parameters = strategyParameters[selectedStrategy];
                Object.entries(parameters).forEach(([key, value]) => {
                    const fieldDiv = document.createElement('div');
                    fieldDiv.className = 'mb-3';

                    const label = document.createElement('label');
                    label.className = 'form-label';
                    label.textContent = key.charAt(0).toUpperCase() + key.slice(1);

                    const input = document.createElement('input');
                    input.className = 'form-control strategy-parameter';
                    input.name = `strategyParams[${key}]`;
                    input.value = value;
                    input.dataset.paramName = key;

                    const hint = document.createElement('div');
                    hint.className = 'form-text';
                    hint.textContent = 'Параметр стратегии обработки';

                    fieldDiv.appendChild(label);
                    fieldDiv.appendChild(input);
                    fieldDiv.appendChild(hint);
                    parameterFields.appendChild(fieldDiv);
                });
            } else {
                parametersDiv.style.display = 'none';
            }
        });

        // Обработчик добавления поля
        $(document).on('click', '.add-field', function() {
            const sourceField = $(this).data('source-field');
            const displayName = $(this).data('display-name');
            const nextPosition = getNextPosition();

            const row = `
                <tr>
                    <td class="col-handle drag-handle">
                        <i class="fas fa-grip-vertical"></i>
                    </td>
                    <td class="col-name">
                        <input type="text" class="form-control field-display-name"
                               value="${displayName}"
                               name="fields[${sourceField}].displayName">
                    </td>
                    <td class="col-key" title="${sourceField}">${sourceField}</td>
                    <td class="col-position text-center">${nextPosition}</td>
                    <td class="col-actions">
                        <button type="button" class="btn btn-outline-danger btn-sm remove-mapping">
                            <i class="fas fa-times"></i>
                        </button>
                    </td>
                </tr>
            `;

            $('#enabledFieldsTable tbody').append(row);
            $(this).closest('tr').remove();
            recalculatePositions();
        });

        // Обработчик удаления поля
        $(document).on('click', '.remove-mapping', function() {
            const row = $(this).closest('tr');
            const sourceField = row.find('td.col-key').text().trim();
            const displayName = row.find('.field-display-name').val();

            const newRow = `
                <tr>
                    <td class="col-name">${displayName}</td>
                    <td class="col-key" title="${sourceField}">${sourceField}</td>
                    <td class="col-actions">
                        <button type="button" class="btn btn-sm btn-success add-field"
                                data-source-field="${sourceField}"
                                data-display-name="${displayName}">
                            <i class="fas fa-plus"></i>
                        </button>
                    </td>
                </tr>
            `;

            $('#disabledFieldsTable tbody').append(newRow);
            row.remove();
            recalculatePositions();
        });

        // Получение следующей доступной позиции
        function getNextPosition() {
            let maxPosition = -1;
            $('#enabledFieldsTable tbody tr').each(function() {
                const position = parseInt($(this).find('.col-position').text());
                if (position > maxPosition) maxPosition = position;
            });
            return maxPosition + 1;
        }

        // Пересчет позиций
        function recalculatePositions() {
            $('#enabledFieldsTable tbody tr').each(function(index) {
                $(this).find('.col-position').text(index);
            });
            updateJsonConfig();
        }

        // Обновление JSON конфигурации
        function updateJsonConfig() {
            const allFields = [];

            // Собираем активные поля
            $('#enabledFieldsTable tbody tr').each(function() {
                const sourceField = $(this).find('.col-key').text().trim();
                const position = parseInt($(this).find('.col-position').text());
                allFields.push({
                    mappingKey: sourceField,
                    description: $(this).find('.field-display-name').val(),
                    position: position,
                    enabled: true
                });
            });

            // Собираем неактивные поля
            $('#disabledFieldsTable tbody tr').each(function() {
                const sourceField = $(this).find('.col-key').text().trim();
                allFields.push({
                    mappingKey: sourceField,
                    description: $(this).find('.col-name').text(),
                    position: -1,
                    enabled: false
                });
            });

            $('#positionsJson').val(JSON.stringify(allFields));
        }

        // Обработчик отправки формы
        $('#exportForm').on('submit', function(e) {
            // Обновляем параметры стратегии
            const selectedStrategy = document.getElementById('strategyType').value;
            if (selectedStrategy) {
                const parameters = {};
                document.querySelectorAll('.strategy-parameter').forEach(input => {
                    parameters[input.dataset.paramName] = input.value;
                });

                // Отправляем параметры стратегии
                fetch(`/client/${clientId}/export-mappings/strategy-params/${selectedStrategy}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(parameters)
                });
            }
        });

        // Инициализация при загрузке
        recalculatePositions();
        $('#strategyType').trigger('change');
    });
</script>
</body>
</html>
